<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <title>Cultural Exhibition of Computing - Aurora University 2026 | Register now!</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header id="header">
            <img src="images/logo.png">
            <h1>Cultural Exhibition of Computing - Aurora University 2026</h1>
        </header>

        <main>
            <h2>Register</h2>
            <form action="https://www.w3schools.com/action_page.php" method="post">
                <label for="name">Write your name:</label><br>
                <input type="text" id="name" name="Name"><br><br>

                <label for="phone">Now write your phone:</label><br>
                <input type="number" id="phone" name="Phone"><br><br>

                <label for="email">Your e-mail:</label><br>
                <input type="text" id="email" name="Email"><br><br>

                <label for="course">Your course:</label><br>
                <select name="Course" id="course">
                    <option value="systems">Systems Analysis and Development</option>
                    <option value="information">Information Systems</option>
                    <option value="computer">Computer Science</option>
                </select><br><br>

                <p>Time of day that suits you best:</p>
                <input type="radio" id="morning" name="Time" value="morning">
                <label for="morning">Morning</label>
                <input class="radioinput" type="radio" id="afternoon" name="Time" value="afternoon">
                <label for="afternoon">Afternoon</label>
                <input class="radioinput" type="radio" id="evening" name="Time" value="evening">
                <label for="evening">Evening</label><br><br>

                <P>Choose the categories:</P>
                <input type="checkbox" id="opt1" name="Option_1" value="music">
                <label for="opt1">Music</label><br>
                <input type="checkbox" id="opt2" name="Option_2" value="theater">
                <label for="opt2">Theater</label><br>
                <input type="checkbox" id="opt3" name="Option_3" value="dance">
                <label for="opt3">Dance</label><br>
                <input type="checkbox" id="opt4" name="Option_4" value="painting">
                <label for="opt4">Painting</label><br><br>

                <label for="feedback">Leave your feedback below:</label><br>
                <textarea id="feedback" name="Feedback" rows="5" cols="35"></textarea><br><br>

                <input type="submit"><br><br>
            </form>
        </main>

        <footer>
            <p class="footerelement">Developed by <br><b>nathan</b></p>
            <a class="footerelement" href="#header">Back to top</a><br><br>
            <a class="footerelement" href="images/jin.png">jin</a><br><br>
        </footer>
    </body>
</html>
